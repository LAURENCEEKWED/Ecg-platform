version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecg-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-ecg-super-secret-change-in-prod}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - HIGH_RISK_THRESHOLD=67
      - WARNING_RISK_THRESHOLD=34
    volumes:
      - ecg_uploads:/app/uploads
      - ecg_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ecg-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecg-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecg-net

volumes:
  ecg_uploads:
  ecg_data:

networks:
  ecg-net:
    driver: bridge
